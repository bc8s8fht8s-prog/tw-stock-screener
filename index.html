<!DOCTYPE html>
<html lang="zh-TW">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>台股日Ｋ選股</title>

    <link rel="stylesheet" href="static/style.css">

</head>

<body>

    <div class="container">

        <h1>📈 台股日Ｋ選股</h1>

        <div class="info">

            <div class="info-row">
                <span>🕒 更新時間</span>
                <span id="update_time">讀取中...</span>
            </div>

            <div class="info-row">
                <span>📊 掃描股票</span>
                <span id="scan_count">-</span>
            </div>

            <div class="info-row">
                <span>🎯 符合條件</span>
                <span id="count">-</span>
            </div>

        </div>

        <!-- 搜尋 + 排序 + 月OSC -->
        <div
            style="
                margin:20px 0;
                display:flex;
                justify-content:center;
                align-items:center;
                gap:10px;
                flex-wrap:wrap;
            "
        >

            <input
                id="search"
                type="text"
                placeholder="🔍 輸入股號或股名..."
                oninput="searchStocks()"
                style="
                    flex:1;
                    min-width:220px;
                    max-width:420px;
                    padding:12px 16px;
                    font-size:16px;
                    border:1px solid #cccccc;
                    border-radius:10px;
                    outline:none;
                    box-sizing:border-box;
                "
            >

            <select
                id="sortSelect"
                onchange="changeSort()"
                style="
                    padding:12px;
                    font-size:16px;
                    border:1px solid #cccccc;
                    border-radius:10px;
                    outline:none;
                    cursor:pointer;
                "
            >
                <option value="code">股號排序</option>
                <option value="change">漲跌幅排序</option>
            </select>

            <select
                id="oscFilter"
                onchange="changeOscFilter()"
                style="
                    padding:12px;
                    font-size:16px;
                    border:1px solid #cccccc;
                    border-radius:10px;
                    outline:none;
                    cursor:pointer;
                "
            >
                <option value="0">月 OSC 不設限</option>
                <option value="1">月 OSC ±1</option>
                <option value="2">月 OSC ±2</option>
                <option value="3">月 OSC ±3</option>
            </select>

        </div>

        <div id="stock-list"></div>

        <div id="pagination"></div>

    </div>

    <script src="script.js?v=1.5.1"></script>

</body>

</html>
